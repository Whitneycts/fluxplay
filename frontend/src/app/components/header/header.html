<header style="display:flex; align-items:center; justify-content:space-between; padding:16px 32px; background:rgba(9,6,15,0.9); border-bottom:0.5px solid rgba(167,139,250,0.15); position:sticky; top:0; z-index:100;">

  <div routerLink="/" style="font-size:22px; font-weight:700; background:linear-gradient(90deg,#a78bfa,#fb923c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; cursor:pointer;">
    FluxPlay
  </div>

  <nav style="display:flex; gap:28px;">
    <a routerLink="/" style="color:#888; text-decoration:none; font-size:14px;">Início</a>
    <a routerLink="/filmes" style="color:#888; text-decoration:none; font-size:14px;">Filmes</a>
    <a routerLink="/series" style="color:#888; text-decoration:none; font-size:14px;">Séries</a>
  </nav>

  <div *ngIf="authService.estaLogado()" style="display:flex; align-items:center; gap:16px;">
    <span style="color:#888; font-size:14px;">
      Olá, <strong style="color:#a78bfa;">{{ authService.getUsuario()?.nome }}</strong>
    </span>
    <button (click)="logout()" style="background:transparent; color:#fb923c; border:0.5px solid #fb923c; border-radius:8px; padding:8px 16px; font-size:14px; cursor:pointer;">
      Sair
    </button>
  </div>

  <button *ngIf="!authService.estaLogado()" routerLink="/login" style="background:linear-gradient(90deg,#a78bfa,#fb923c); color:white; border:none; border-radius:8px; padding:10px 20px; font-size:14px; font-weight:500; cursor:pointer;">
    Entrar
  </button>

</header>
