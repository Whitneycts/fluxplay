<div class="cadastro-page">
  <div class="cadastro-box">

    <div class="cadastro-logo">FluxPlay</div>
    <p class="cadastro-tagline">Sua plataforma de streaming</p>

    <h2 class="cadastro-title">Criar conta</h2>
    <p class="cadastro-sub">Junte-se ao FluxPlay hoje</p>

    <div class="form-group">
      <label>Nome</label>
      <input type="text" placeholder="Seu nome" [(ngModel)]="nome" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="seu@email.com" [(ngModel)]="email" />
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" placeholder="••••••••" [(ngModel)]="senha" />
    </div>

    <p class="erro" *ngIf="erro">{{ erro }}</p>
    <p class="sucesso" *ngIf="sucesso">{{ sucesso }}</p>

    <button class="cadastro-btn" (click)="cadastrar()" [disabled]="carregando">
      {{ carregando ? 'Criando conta...' : 'Criar conta' }}
    </button>

    <p class="cadastro-link">
      Já tem conta? <span routerLink="/login">Entrar</span>
    </p>

  </div>
</div>
